# Autocut Charging — Configuration File
# ─────────────────────────────────────────
# Edit values here. Changes take effect within one polling cycle (no reboot needed).
# Do NOT remove keys — only change their values.
# Lines starting with # are comments and are ignored.

# ── Module Toggle ─────────────────────────────────────────────────────────────
# Enable or disable the module. (1 = enabled, 0 = disabled)
ENABLED=1

# ── Charging Thresholds ───────────────────────────────────────────────────────
# Stop charging when battery reaches this level while screen is OFF (%)
# Recommended: 80–90
THRESHOLD_SCREEN_OFF=85

# Stop charging when battery reaches this level while screen is ON (%)
# Recommended: 70–80
THRESHOLD_SCREEN_ON=75

# ── Resume Charging ───────────────────────────────────────────────────────────
# Re-enable charging when battery drops to this level after being paused (%)
# Must be lower than both threshold values above.
RESUME_LEVEL=70

# ── Temperature Protection ────────────────────────────────────────────────────
# Pause charging if battery temperature reaches this value (°C)
# Recommended: 40–50
TEMP_LIMIT=45

# ── Current Limiter (Slow Charge) ─────────────────────────────────────────────
# Limit the maximum charging speed (mA). Set to 0 to disable limits.
# Recommended for overnight charging: 1000 or 1500
CURRENT_LIMIT=0

# ── Notifications ─────────────────────────────────────────────────────────────
# Show toast and system notifications for charging events. (1 = on, 0 = off)
NOTIFY=1

# ── Polling Intervals ─────────────────────────────────────────────────────────
# How often to check battery status when charger IS connected (seconds)
# Lower = more responsive, higher = less CPU usage. Recommended: 20–60
POLL_INTERVAL_CHARGING=30

# How often to check when NO charger is connected (seconds)
# Can be much longer since we don't need to react quickly. Recommended: 90–180
POLL_INTERVAL_IDLE=120